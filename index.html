<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <!-- 新增：移动端沉浸式全屏（PWA）与状态栏声明 -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#efe9e4">
    <link rel="manifest" href='data:application/manifest+json;utf8,{"name":"猫叶的塔罗工作台","short_name":"塔罗工作台","display":"standalone","start_url":".","background_color":"#efe9e4","theme_color":"#efe9e4"}'>
    <!-- ============================================== -->

    <title>猫叶的塔罗工作台 - 塔罗占卜</title>
    <style>
        :root {
            --bg-light: #efe9e4; 
            --bg-grad: #e2d3c5;
            --accent: #bda285; 
            --accent-dim: #e6dfd6;
            --text-main: #7a6e62;
            --card-w: 100px; 
            --card-h: 172px;
            --danger: #d9534f;
        }
        
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; user-select: none; }
        
        body {
            background: var(--bg-light); 
            background-image: radial-gradient(circle at 50% 50%, #fdfbf8 0%, var(--bg-grad) 100%);
            margin: 0; padding: 0; height: 100dvh; width: 100vw; 
            overflow: hidden; touch-action: none; position: fixed;
            font-family: 'Helvetica Neue', Helvetica, 'PingFang SC', 'Microsoft YaHei', sans-serif;
            color: var(--text-main);
        }
        .view-container { width: 100%; height: 100%; position: absolute; top: 0; left: 0; }
        
        .header-bar {
            height: 60px; display: flex; justify-content: space-between; align-items: center;
            padding: 0 20px; background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(189, 162, 133, 0.15); z-index: 10000; position: relative;
        }
        /* 顶部白色的复古花边边角美化 */
        .header-bg-decor {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 72px; 
            pointer-events: none;
            z-index: 0;
            opacity: 0.95;
            -webkit-mask-image: linear-gradient(black, black), radial-gradient(circle at 12px 0px, black 12px, transparent 12.5px);
            -webkit-mask-size: 100% 60px, 24px 12px;
            -webkit-mask-position: top left, bottom left;
            -webkit-mask-repeat: no-repeat, repeat-x;
            mask-image: linear-gradient(black, black), radial-gradient(circle at 12px 0px, black 12px, transparent 12.5px);
            mask-size: 100% 60px, 24px 12px;
            mask-position: top left, bottom left;
            mask-repeat: no-repeat, repeat-x;
        }

        /* 升级美化：更有魔法氛围的标题铭牌 */
        .title-badge {
            font-size: 15px;
            font-weight: bold;
            position: relative;
            z-index: 1;
            background: linear-gradient(180deg, #fdfbf8 0%, #f4eee7 100%);
            color: #5c5248;
            padding: 8px 24px;
            border-radius: 30px; 
            border: 1px solid rgba(189, 162, 133, 0.4);
            box-shadow: 0 4px 15px rgba(122, 110, 98, 0.08), inset 0 2px 4px #fff;
            letter-spacing: 2.5px;
            display: flex;
            align-items: center;
            gap: 8px;
            text-shadow: 0 1px 1px rgba(255,255,255,0.8);
        }
        .title-badge::before, .title-badge::after {
            content: "✧";
            color: var(--accent);
            font-size: 14px;
            font-weight: 400;
            opacity: 0.8;
        }
        
        .nav-btn {
            background: #fff; border: 1px solid var(--accent-dim); 
            color: var(--text-main); padding: 5px 12px; border-radius: 12px; font-size: 10px;
            cursor: pointer; transition: all 0.2s;
            box-shadow: 0 2px 8px rgba(122, 110, 98, 0.06);
            display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 2px;
            position: relative; z-index: 1; 
        }
        .nav-btn:active { background: var(--bg-grad); transform: scale(0.95); }
        .nav-btn svg { width: 18px; height: 18px; opacity: 0.85; stroke-width: 2.5; }
        
        #sidebar {
            position: absolute; left: 12px; top: 70px;
            display: flex; flex-direction: column; justify-content: flex-start; gap: 8px;
            z-index: 10000; pointer-events: none; 
        }
        
        #sidebar-filters {
            display: flex;
            flex-direction: column;
            gap: 8px;
            overflow-y: auto;
            overflow-x: hidden;
            scrollbar-width: none; 
            max-height: 0;
            opacity: 0;
            transform: translateX(-15px);
            transition: all 0.6s cubic-bezier(0.22, 1, 0.36, 1);
            pointer-events: none;
        }
        #sidebar-filters::-webkit-scrollbar { display: none; }
        
        #sidebar-filters.open {
            max-height: calc(100dvh - 140px);
            opacity: 1;
            transform: translateX(0);
            pointer-events: auto;
            margin-top: 4px;
        }
        #action-sidebar {
            position: absolute; right: 12px; top: 70px;
            display: flex; flex-direction: column; justify-content: flex-start; align-items: flex-end; gap: 8px;
            z-index: 10000; pointer-events: none; 
        }
        
        #action-sidebar-menu {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 8px;
            overflow-y: auto;
            overflow-x: hidden;
            scrollbar-width: none;
            max-height: 0;
            opacity: 0;
            transform: translateX(15px);
            transition: all 0.6s cubic-bezier(0.22, 1, 0.36, 1);
            pointer-events: none;
        }
        #action-sidebar-menu::-webkit-scrollbar { display: none; }
        #action-sidebar-menu.open {
            max-height: calc(100dvh - 140px);
            opacity: 1;
            transform: translateX(0);
            pointer-events: auto;
            margin-top: 4px;
        }
        .sidebar-btn {
            pointer-events: auto; 
            background: rgba(253, 251, 247, 0.85); 
            border: 1px solid var(--accent-dim); 
            color: var(--text-main); 
            width: 46px; height: 46px; 
            border-radius: 12px; 
            font-size: 9px; font-weight: bold;
            cursor: pointer; transition: all 0.2s;
            box-shadow: 0 4px 12px rgba(122, 110, 98, 0.08);
            display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 2px;
            backdrop-filter: blur(5px); -webkit-backdrop-filter: blur(5px);
        }
        .sidebar-btn.active { background: var(--text-main); color: #fff; border-color: var(--text-main); }
        .sidebar-btn:active { transform: scale(0.92); }
        .sidebar-btn svg { width: 22px; height: 22px; opacity: 0.9; stroke-width: 2; fill: none; stroke: currentColor; stroke-linecap: round; stroke-linejoin: round; }
        #hint { position: absolute; top: 75px; width: 100%; text-align: center; font-size: 12px; color: #a3998f; pointer-events: none; opacity: 0.9; z-index: 2000; letter-spacing: 1px;}
        
        /* 升级美化：全局复古纸张纹理（性能优化防频闪版） */
        .texture-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 2;
            background-image: url("data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAADIAAAAyBAMAAADsEZWCAAAAGFBMVEUAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAANY0xEAAAACHRSTlMAAwUHCQoNDg8REhMUGBobHB0hIiQnKCkqMTI0NTc5Ojw/QERGR0lKS0xNTlBTVFVXWFlaXV5fYGFiY2VnaGtvcHFzdHV3eHl7fH1/gYKDhIWGh4iJjI2Oj5CRkpOUlZaXmJmcnZ6foKGjpKanqKmqrK2ur7CxsrO1tre4u7y+v8DBwsPExcbHyMnKzM3P0NHS09TV1tfY2drb3N3e3+Dh4uPk5ebn6Onq6+zt7u/w8fLz9PX29/j5+vv8/f6xTzkKAAACGElEQVQ4y2NgQAX8/Pz//wMGMAC1QIQDCAgI/EdTz8TEBFMIEgMJiIqK/kdXz8nJCVMAEgMJSEhI/EdTz8/PD1MAEgMJiIuL/kdTz9DQEFMAEgMJiIiI/EdTz8nJCVMAEgMJiImJ/kdTz8vLC1MAEgMJiIuL/kdTz8nJCVMAEgMJiIiI/EdTz9nZGVMAEgMJiImJ/kdTz8nJCVMAEgMJiImJ/kdTz9DQEFMAEgMJiIiI/EdTz8nJCVMAEgMJiIuL/kdTz9DQEFMAEgMJiIiI/EdTz9DQEFMAEgMJiImJ/kdTz9DQEFMAEgMJiImJ/kdTz9nZGVMAEgMJiIiI/EdTz8vLC1MAEgMJiIiI/EdTz8/PD1MAEgMJiIuL/kdTz9DQEFMAEgMJiImJ/kdTz9nZGVMAEgMJiIuL/kdTz8/PD1MAEgMJiImJ/kdTz8nJCVMAEgMJiIiI/EdTz9DQEFMAEgMJiImJ/kdTz9DQEFMAEgMJiImJ/kdTz8vLC1MAEgMJiIuL/kdTz8nJCVMAEgMJiIiI/EdTz9DQEFMAEgMJiIiI/EdTz8/PD1MAEgMJiImJ/kdTz8nJCVMAEgMJiImJ/kdTz9DQEFMAEgMJiIiI/EdTz9DQEFMAEgMJiIuL/kdTz9DQEFMAEgMJiIiI/EdTz9nZGVMAEgMJiImJ/kfUAAA6Ew45I4A4QAAAAABJRU5ErkJggg==");
            opacity: 0.15;
            mix-blend-mode: multiply;
            transform: translateZ(0);
        }

        /* 升级美化：全局环境光影与暗角 */
        .vignette-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 3;
            background: radial-gradient(circle at 50% 50%, transparent 35%, rgba(100, 75, 55, 0.25) 130%);
            transform: translateZ(0);
        }

        /* 升级美化：桌面居中魔法阵水印 */
        .desk-watermark {
            position: absolute;
            top: 45%; left: 50%;
            transform: translate(-50%, -50%) translateZ(0);
            opacity: 0.15;
            pointer-events: none;
            width: 320px; height: 320px;
            z-index: 1;
            color: var(--accent);
        }

        #desktop { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1000; pointer-events: none;}
        #fan-track { position: absolute; bottom: -20px; left: 0; width: 100%; height: 260px; z-index: 500; pointer-events: auto; }
        .card {
            position: absolute; width: var(--card-w); height: var(--card-h);
            left: 50%; bottom: 30px; margin-left: calc(var(--card-w) / -2);
            will-change: transform, opacity, left, top; z-index: 10;
            perspective: 1000px;
        }
        
        .card-inner {
            position: relative; width: 100%; height: 100%;
            transition: transform 0.6s cubic-bezier(0.4, 0.0, 0.2, 1);
            transform-style: preserve-3d;
            border-radius: 8px; box-shadow: 0 4px 12px rgba(122, 110, 98, 0.12);
            transform: translateZ(0);
        }
        
        .card-front, .card-back {
            position: absolute; width: 100%; height: 100%;
            -webkit-backface-visibility: hidden; backface-visibility: hidden;
            border-radius: 8px; border: 1px solid #fff;
            display: flex; justify-content: center; align-items: center; text-align: center;
        }
        .card-back {
            background: #faf7f2;
            box-shadow: inset 0 0 0 3px #fff, inset 0 0 0 4px var(--accent-dim);
        }
        .card-back::after { content: " ✧ "; color: var(--accent); font-size: 20px; }
        .card-index {
            position: absolute; top: 3px; left: 5px;
            font-size: 11px; font-weight: bold; font-family: 'Helvetica Neue', Helvetica, sans-serif;
            color: var(--text-main); opacity: 0; transition: opacity 0.3s;
            z-index: 2;
        }
        .card.is-fanned .card-index { opacity: 1; }
        .card-front {
            background: #fff; 
            color: var(--text-main);
            transform: rotateY(180deg);
            flex-direction: column; padding: 5px;
            box-shadow: inset 0 0 10px rgba(189, 162, 133, 0.05);
            position: relative;
        }
        
        .card-image {
            position: absolute;
            top: 4px; left: 4px;
            width: calc(100% - 8px); height: calc(100% - 8px);
            object-fit: cover;
            border-radius: 4px;
            z-index: 1;
            -webkit-user-drag: none;
            user-drag: none;
            pointer-events: none;
        }
        
        .card.is-reversed .card-front { transform: rotateY(180deg) rotateZ(180deg); }
        .card-front .name { font-size: 11px; font-weight: bold; margin-top: auto; margin-bottom: auto; position: relative; z-index: 2;}
        
        .card.is-flipped .card-inner { transform: rotateY(180deg); }
        .card.animating { transition: transform 0.6s cubic-bezier(0.2, 0.8, 0.3, 1), opacity 0.4s; }
        
        .card.on-desktop { position: fixed; z-index: 8000; pointer-events: auto; cursor: pointer; }
        .card.dragging { z-index: 9999 !important; }
        .card.dragging .card-inner { box-shadow: 0 12px 25px rgba(122, 110, 98, 0.2); transform: scale(1.08); transition: transform 0.2s; }
        .card.dragging.is-flipped .card-inner { transform: rotateY(180deg) scale(1.08); }
        
        /* 卡牌放大详情弹窗结构 */
        #card-zoom-modal {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100dvh;
            background: rgba(0, 0, 0, 0.55);
            backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px);
            z-index: 1000000;
            display: flex; align-items: center; justify-content: center;
            opacity: 0; pointer-events: none; transition: opacity 0.3s;
        }
        #card-zoom-modal.show {
            opacity: 1; pointer-events: auto;
        }
        .zoom-card-container {
            position: relative;
            width: 55vw;             
            max-width: 240px;        
            aspect-ratio: 100 / 172;
            perspective: 1200px;
            transform: translateY(20px) scale(0.95);
            transition: transform 0.4s cubic-bezier(0.2, 0.8, 0.3, 1);
        }
        #card-zoom-modal.show .zoom-card-container {
            transform: translateY(0) scale(1);
        }
        .zoom-card-inner {
            width: 100%; height: 100%; position: relative;
            transition: transform 0.8s cubic-bezier(0.22, 1, 0.36, 1); 
            transform-style: preserve-3d;
            border-radius: 16px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
            transform: rotateY(0deg) translateZ(0); 
        }
        .zoom-card-inner.is-flipped { transform: rotateY(180deg) translateZ(0); }
        
        .zoom-card-front, .zoom-card-back {
            position: absolute; width: 100%; height: 100%;
            -webkit-backface-visibility: hidden; backface-visibility: hidden;
            border-radius: 16px; border: 2px solid #fff;
            display: flex; justify-content: center; align-items: center;
            background: #fff;
        }
        
        .zoom-card-front {
            transition: transform 0.8s cubic-bezier(0.22, 1, 0.36, 1);
            transform: rotateZ(0deg); 
        }
        .zoom-card-inner.is-rotated .zoom-card-front { transform: rotateZ(180deg); }
        
        .zoom-card-front img {
            width: calc(100% - 12px); height: calc(100% - 12px);
            object-fit: cover; border-radius: 10px;
        }
        
        /* 牌意背板排版优化 */
        .zoom-card-back {
            transform: rotateY(180deg);
            background: #fdfbf8; 
            padding: 20px 16px;
            box-shadow: inset 0 0 0 3px #fff, inset 0 0 0 4px var(--accent-dim);
            flex-direction: column; justify-content: flex-start;
            color: var(--text-main);
            overflow-y: auto;
            scrollbar-width: none;
        }
        .zoom-card-back::-webkit-scrollbar { display: none; }
        
        /* 牌意内容排版类 */
        .m-header { display: flex; justify-content: space-between; align-items: center; width: 100%; border-bottom: 2px dashed var(--accent-dim); padding-bottom: 8px; margin-bottom: 10px; }
        .m-status { font-size: 18px; font-weight: 900; color: #a48165; }
        .m-status.rev { color: var(--danger); opacity: 0.8; }
        .m-title { font-size: 16px; font-weight: bold; letter-spacing: 1px; }
        .m-meta { display: flex; justify-content: center; align-items: center; width: 100%; background: rgba(189, 162, 133, 0.1); padding: 8px 6px; border-radius: 4px; margin-bottom: 12px; }
        .m-section { width: 100%; font-size: 12px; line-height: 1.6; margin-bottom: 10px; text-align: justify; }
        .m-hl { background: rgba(234, 203, 150, 0.5); padding: 1px 4px; font-weight: bold; border-radius: 3px; display: inline-block; margin-right: 4px;}
        
        .zoom-btn {
            position: absolute; width: 48px; height: 48px; border-radius: 50%;
            background: rgba(253, 251, 247, 0.95); border: 1px solid var(--accent-dim);
            color: var(--text-main);
            display: flex; justify-content: center; align-items: center;
            cursor: pointer; box-shadow: 0 4px 15px rgba(0,0,0,0.15);
            z-index: 100; transition: all 0.2s;
            backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px);
        }
        .zoom-btn:active { transform: scale(0.9); }
        .zoom-btn.close-btn { top: -20px; left: -20px; }
        .zoom-btn.moon-btn { bottom: -20px; right: -20px; }
        .zoom-btn.rotate-btn { bottom: -20px; left: -20px; } 
        .zoom-btn svg { width: 22px; height: 22px; stroke-width: 2.5; }
        
        /* 后台排版样式 */
        .admin-scroll-area {
            height: calc(100% - 60px);
            overflow-y: auto;
            padding: 20px;
            padding-bottom: 80px;
        }
        .admin-top-actions {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 20px;
        }
        
        /* 新增：设置选项区域 */
        .admin-settings-panel {
            margin-bottom: 25px;
            display: flex; justify-content: center; align-items: center; gap: 12px;
            background: rgba(253, 251, 247, 0.85); padding: 12px 20px;
            border-radius: 16px; border: 1px solid var(--accent-dim);
            box-shadow: 0 4px 10px rgba(122, 110, 98, 0.04);
            backdrop-filter: blur(5px); -webkit-backdrop-filter: blur(5px);
        }

        .btn-primary {
            background: var(--text-main);
            color: #fff;
            border: none;
            padding: 12px 20px;
            border-radius: 25px;
            font-size: 13px;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(122, 110, 98, 0.25);
            transition: all 0.2s;
        }
        .btn-primary:active { transform: scale(0.95); opacity: 0.9; }
        .deck-item {
            background: rgba(253, 251, 247, 0.85);
            border: 1px solid var(--accent-dim);
            border-radius: 16px;
            padding: 18px 20px;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 10px rgba(122, 110, 98, 0.04);
            backdrop-filter: blur(5px); -webkit-backdrop-filter: blur(5px);
        }
        .deck-info { display: flex; flex-direction: column; gap: 4px; }
        .deck-name { font-size: 15px; font-weight: bold; color: var(--text-main); }
        .deck-status { font-size: 10px; color: var(--accent); letter-spacing: 1px; }
        .deck-item.active { border-color: var(--accent); border-width: 2px; }
        .deck-actions { display: flex; gap: 8px; }
        .action-btn {
            background: #fff;
            border: 1px solid var(--accent-dim);
            color: var(--text-main);
            width: 36px; height: 36px;
            border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: all 0.2s;
            box-shadow: 0 2px 6px rgba(122, 110, 98, 0.05);
        }
        .action-btn:active { transform: scale(0.9); background: var(--bg-grad); }
        .action-btn svg { width: 17px; height: 17px; stroke-width: 2.5; }
        .action-btn.delete { color: var(--danger); border-color: rgba(217, 83, 79, 0.2); }
        .action-btn.apply.active { background: var(--text-main); color: #fff; border-color: var(--text-main); }
        .admin-list-item {
            background: rgba(253, 251, 247, 0.85);
            border: 1px solid var(--accent-dim);
            border-radius: 12px;
            padding: 10px 15px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 12px;
            box-shadow: 0 4px 10px rgba(122, 110, 98, 0.04);
            backdrop-filter: blur(5px); -webkit-backdrop-filter: blur(5px);
        }
        .admin-item-title {
            width: 75px;
            font-size: 13px;
            font-weight: bold;
            color: var(--text-main);
            flex-shrink: 0;
            text-align: left;
        }
        .admin-item-input {
            flex-grow: 1;
            min-width: 0; 
            background: #fff;
            border: 1px solid var(--accent-dim);
            padding: 8px 10px;
            border-radius: 8px;
            font-size: 12px;
            color: var(--text-main);
            outline: none;
            transition: all 0.2s;
        }
        .admin-item-input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 2px rgba(189, 162, 133, 0.2);
        }
        .admin-item-input::placeholder { color: #ccc; }
        .admin-item-btn {
            background: #fff;
            border: 1px solid var(--accent-dim);
            color: var(--text-main);
            padding: 8px 14px;
            border-radius: 8px;
            font-size: 12px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
            flex-shrink: 0;
            box-shadow: 0 2px 6px rgba(122, 110, 98, 0.05);
        }
        .admin-item-btn:active {
            background: var(--bg-grad);
            transform: scale(0.92);
        }
        
        /* 自定义弹窗样式 */
        .custom-modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.35);
            z-index: 100000;
            display: flex; align-items: center; justify-content: center;
            backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px);
        }
        .modal-content {
            background: var(--bg-light);
            border: 1px solid var(--accent-dim);
            border-radius: 16px;
            padding: 24px;
            width: 85%; max-width: 320px;
            box-shadow: 0 10px 30px rgba(122, 110, 98, 0.2);
            text-align: center;
            animation: modalPop 0.3s cubic-bezier(0.2, 0.8, 0.3, 1);
        }
        @keyframes modalPop {
            0% { transform: scale(0.9); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
        .modal-title { font-size: 16px; font-weight: bold; color: var(--text-main); margin-bottom: 12px; }
        .modal-message { font-size: 13px; color: var(--text-main); margin-bottom: 20px; line-height: 1.5; opacity: 0.9; }
        
        .modal-input {
            width: 100%; background: #fff; border: 1px solid var(--accent-dim);
            padding: 12px 14px; border-radius: 8px; font-size: 14px;
            color: var(--text-main); outline: none; margin-bottom: 24px;
            transition: all 0.2s; box-sizing: border-box; text-align: center;
        }
        .modal-input:focus { border-color: var(--accent); box-shadow: 0 0 0 2px rgba(189, 162, 133, 0.2); }
        
        .modal-textarea {
            width: 100%; height: 120px; background: #fff; border: 1px solid var(--accent-dim);
            padding: 12px; border-radius: 8px; font-size: 12px; font-family: monospace;
            color: var(--text-main); outline: none; margin-bottom: 24px;
            transition: all 0.2s; box-sizing: border-box; resize: none; word-break: break-all;
        }
        .modal-textarea:focus { border-color: var(--accent); box-shadow: 0 0 0 2px rgba(189, 162, 133, 0.2); }
        .modal-actions { display: flex; gap: 12px; justify-content: center; }
        .modal-btn {
            flex: 1; padding: 12px 0; border-radius: 20px; font-size: 14px; font-weight: bold;
            cursor: pointer; transition: all 0.2s; border: none; box-shadow: 0 2px 6px rgba(122, 110, 98, 0.05);
        }
        .modal-btn.cancel { background: #fff; border: 1px solid var(--accent-dim); color: var(--text-main); }
        .modal-btn.confirm { background: var(--text-main); color: #fff; }
        .modal-btn.delete { background: var(--danger); color: #fff; }
        .modal-btn:active { transform: scale(0.95); }
    </style>
</head>

            <div class="modal-title">牌意辞典</div>
            <div class="modal-message">输入塔罗牌名，快速翻阅牌意。</div>
